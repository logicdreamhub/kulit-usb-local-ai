name: Wails Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build: [
          {name: 'kulit-linux', platform: 'linux/amd64', os: 'ubuntu-latest', tags: 'webkit2_41'},
          {name: 'kulit-windows', platform: 'windows/amd64', os: 'windows-latest', tags: ''},
          {name: 'kulit-mac', platform: 'darwin/universal', os: 'macos-latest', tags: ''}
        ]
    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.build.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Build
        run: |
          cd kulit-gui
          if [ "${{ matrix.build.tags }}" != "" ]; then
            wails build -platform ${{ matrix.build.platform }} -tags ${{ matrix.build.tags }}
          else
            wails build -platform ${{ matrix.build.platform }}
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: |
            kulit-gui/build/bin/kulit-gui
            kulit-gui/build/bin/kulit-gui.exe
            kulit-gui/build/bin/kulit-gui.app
